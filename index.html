<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สั่งขนมโตเกียวออนไลน์ - ร้านโตเกียว</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen pb-24">

  <audio id="notif-sound-cooking" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" prepend="auto"></audio>
  <audio id="notif-sound-ready" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-84.wav" prepend="auto"></audio>

  <div class="bg-amber-500 text-slate-900 px-4 py-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
    <div>
      <h1 class="text-xl font-black">🥞 โตเกียวร้อน ๆ จากเตา</h1>
      <p class="text-xs font-semibold opacity-80" id="table-display">กำลังโหลดเลขโต๊ะ...</p>
    </div>
    <div id="active-queue-badge" class="hidden bg-slate-950 text-amber-400 px-3 py-1.5 rounded-full text-xs font-black shadow animate-pulse">
      คิวของคุณ: #<span id="my-queue-no">-</span>
    </div>
  </div>

  <div class="max-w-md mx-auto p-4 space-y-6">
    <div id="status-card" class="hidden bg-slate-900 text-white p-5 rounded-2xl shadow-xl border-2 border-amber-500/20 space-y-4 text-center">
      <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">สถานะออเดอร์ปัจจุบันของคุณ</h3>
      <div class="py-2">
        <p id="order-status-text" class="text-2xl font-black text-amber-400">⏳ รอรับออเดอร์...</p>
        <p id="order-status-desc" class="text-xs text-gray-400 mt-2">ห้องครัวกำลังจัดเตรียมวัตถุดิบ</p>
      </div>
      <div class="w-full bg-slate-800 rounded-full h-2.5 overflow-hidden">
        <div id="status-progress" class="bg-amber-500 h-2.5 rounded-full transition-all duration-500" style="width: 25%"></div>
      </div>
      
      <button onclick="enableAddMore()" id="btn-add-more" class="w-full bg-slate-800 hover:bg-slate-700 text-amber-400 border border-slate-700 py-2.5 rounded-xl text-xs font-bold transition-all mt-2">
        🛒 ต้องการสั่งเมนูเพิ่ม (ใช้คิวเดิม)
      </button>
    </div>

    <div id="add-more-alert" class="hidden bg-amber-50 border border-amber-200 p-3 rounded-xl text-xs text-amber-800 font-medium flex justify-between items-center">
      <span>⚙️ โหมดสั่งอาหารเพิ่ม: เมนูที่คุณเลือกจะถูกส่งเข้ารวมกับคิวเดิมของคุณทันที</span>
      <button onclick="cancelAddMore()" class="text-red-600 font-bold underline">ยกเลิก</button>
    </div>

    <div id="menu-section" class="space-y-4">
      <h2 class="text-lg font-black text-slate-900 border-l-4 border-amber-500 pl-2">🥞 เลือกไส้ขนมโตเกียว</h2>
      <div id="menu-list" class="grid grid-cols-1 gap-3">
        <p class="text-sm text-gray-500">กำลังโหลดเมนูความอร่อย...</p>
      </div>
    </div>

    <div id="note-section" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
      <label class="text-xs font-bold text-gray-500 block mb-1">✍️ หมายเหตุเพิ่มเติม (ถ้ามี)</label>
      <input type="text" id="order-note" placeholder="เช่น ไม่ใส่ซอส, ขอแป้งกรอบ ๆ" class="w-full p-2.5 rounded-xl border border-gray-300 text-sm focus:outline-none focus:border-amber-500 bg-gray-50">
    </div>
  </div>

  <div id="cart-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 shadow-xl max-w-md mx-auto rounded-t-3xl z-40">
    <div class="flex justify-between items-center gap-4">
      <div>
        <p class="text-xs text-gray-400 font-bold">ราคารวมรอบนี้</p>
        <p class="text-xl font-black text-slate-900">฿<span id="cart-total-price">0</span></p>
      </div>
      <button onclick="submitOrder()" id="btn-submit" class="flex-1 bg-amber-500 hover:bg-amber-600 text-slate-900 font-black py-3 px-6 rounded-2xl transition-all shadow-md text-center">
        🚀 ส่งรายการสั่งอาหาร
      </button>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const tableNumber = urlParams.get('table') || "หน้าร้าน";
    document.getElementById('table-display').innerText = `📍 ตรวจพบตำแหน่ง: โต๊ะ ${tableNumber}`;

    const firebaseConfig = {
      apiKey: "AIzaSyC-slki_yhAJuHbizE4q1CDUz9rV4vHeL4",
      authDomain: "pos-sale-9c1d6.firebaseapp.com",
      projectId: "pos-sale-9c1d6",
      storageBucket: "pos-sale-9c1d6.firebasestorage.app",
      messagingSenderId: "55694019495",
      appId: "1:55694019495:web:6b7e4612f30bf1ad4e4482",
      measurementId: "G-ZCLCDJQ2F1"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let cart = {};
    let currentOrderId = localStorage.getItem('active_order_id') || null;
    let lastStatus = localStorage.getItem('last_known_status') || "";
    let isAddMoreMode = false; // คอยเช็คว่าอยู่ในโหมดสั่งเพิ่มในคิวเดิมหรือไม่

    // 🔊 ⚡ ฟังก์ชันแจ้งเตือนเวอร์ชันอัปเกรด (ใช้ไฟล์เสียงจริง + สั่น)
    function notifyClient(status) {
      // 1. สั่งสั่นสะเทือนระบบ (ทำงานดีบน Android)
      if ("vibrate" in navigator) {
        if (status === "เสร็จแล้ว") {
          navigator.vibrate([400, 150, 400, 150, 500]); 
        } else if (status === "กำลังทำ") {
          navigator.vibrate([200, 100, 200]);
        }
      }

      // 2. สั่งเล่นไฟล์เสียงตรงรุ่น
      try {
        if (status === "เสร็จแล้ว") {
          const snd = document.getElementById("notif-sound-ready");
          snd.currentTime = 0; snd.play().catch(e => console.log("ติดสิทธิ์ Autoplay"));
          alert("🥞 ขนมโตเกียวของคุณทำเสร็จแล้วจ้า! กรุณามารับที่หน้าเตาได้เลยค่ะ 🎉"); // เพิ่ม Alert เพื่อบังคับให้หน้าจอมือถือตื่นขึ้นมาสั่นและดัง
        } else if (status === "กำลังทำ") {
          const snd = document.getElementById("notif-sound-cooking");
          snd.currentTime = 0; snd.play().catch(e => console.log("ติดสิทธิ์ Autoplay"));
        }
      } catch(e) { console.log(e); }
    }

    // ดึงเมนูจาก Firebase
    db.collection("menus").where("status", "==", "available").onSnapshot((snapshot) => {
      const menuList = document.getElementById('menu-list');
      menuList.innerHTML = "";
      snapshot.forEach((doc) => {
        const item = doc.data();
        menuList.innerHTML += `
          <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-200 flex gap-3 items-center">
            <img src="${item.image}" class="w-20 h-20 object-cover rounded-xl bg-gray-100 flex-shrink-0">
            <div class="flex-1 min-w-0">
              <h3 class="font-bold text-slate-900 truncate">${item.name}</h3>
              <p class="text-sm font-black text-amber-600 mt-1">฿${item.price}</p>
            </div>
            <div class="flex items-center gap-2 bg-gray-100 p-1.5 rounded-xl">
              <button onclick="updateQty('${item.name}', -1, ${item.price}, ${item.cost || 0})" class="bg-white w-7 h-7 font-bold rounded-lg shadow-sm flex items-center justify-center text-sm">-</button>
              <span id="qty-${item.name.replace(/\s+/g, '')}" class="w-6 text-center text-sm font-bold">0</span>
              <button onclick="updateQty('${item.name}', 1, ${item.price}, ${item.cost || 0})" class="bg-amber-500 text-slate-900 w-7 h-7 font-bold rounded-lg shadow-sm flex items-center justify-center text-sm">+</button>
            </div>
          </div>
        `;
      });
      refreshCartUI();
    });

    function updateQty(name, change, price, cost) {
      if (!cart[name]) cart[name] = { qty: 0, price: price, cost: cost };
      cart[name].qty += change;
      if (cart[name].qty <= 0) delete cart[name];
      
      const el = document.getElementById(`qty-${name.replace(/\s+/g, '')}`);
      if(el) el.innerText = cart[name].qty ? cart[name].qty : 0;
      updateCartTotal();
    }

    function refreshCartUI() {
      Object.keys(cart).forEach(name => {
        const el = document.getElementById(`qty-${name.replace(/\s+/g, '')}`);
        if(el) el.innerText = cart[name].qty;
      });
      updateCartTotal();
    }

    function updateCartTotal() {
      let total = 0;
      Object.keys(cart).forEach(k => total += (cart[k].qty * cart[k].price));
      document.getElementById('cart-total-price').innerText = total.toLocaleString();
    }

    // เปิดโหมดสั่งอาหารเพิ่ม (ซ่อนสถานะคิวชั่วคราว ดึงหน้าเมนูกลับมา)
    function enableAddMore() {
      isAddMoreMode = true;
      document.getElementById('add-more-alert').classList.remove('hidden');
      document.getElementById('menu-section').classList.remove('hidden');
      document.getElementById('note-section').classList.remove('hidden');
      document.getElementById('cart-bar').classList.remove('hidden');
      document.getElementById('btn-submit').innerText = "➕ ยิงรายการสั่งเพิ่มเข้ารวมคิวเดิม";
      cart = {}; // ล้างตะกร้าเก่าเพื่อเตรียมเลือกของชิ้นใหม่
      refreshCartUI();
    }

    function cancelAddMore() {
      isAddMoreMode = false;
      document.getElementById('add-more-alert').classList.add('hidden');
      checkOrderStatus(); // เด้งหน้าจอกลับไปล็อกหน้ารอคิวเหมือนเดิม
    }

    // ฟังก์ชันกดส่งออเดอร์ (รองรับทั้งสั่งใหม่ และ สั่งเพิ่มในคิวเดิม)
    function submitOrder() {
      const newItems = Object.keys(cart).map(k => ({ name: k, qty: cart[k].qty, price: cart[k].price, cost: cart[k].cost }));
      if (newItems.length === 0) return alert("กรุณาเลือกเมนูอย่างน้อย 1 ชิ้นก่อนส่งครับ");

      let addPrice = 0, addCost = 0;
      newItems.forEach(i => { addPrice += (i.qty * i.price); addCost += (i.qty * i.cost); });

      document.getElementById('btn-submit').disabled = true;

      // เคสที่ 1: ลูกค้ากด "สั่งเพิ่ม" ในคิวเดิม
      if (isAddMoreMode && currentOrderId) {
        const orderRef = db.collection("orders").doc(currentOrderId);
        
        db.runTransaction(async (transaction) => {
          const sfDoc = await transaction.get(orderRef);
          if (!sfDoc.exists) throw "ไม่พบออเดอร์เดิม";

          const oldOrder = sfDoc.data();
          let updatedItems = [...oldOrder.items];

          // ลูปเพื่อเอาสินค้าใหม่ไปรวมจำนวนกับสินค้าเก่า ถ้าชื่อซ้ำให้บวก Qty เพิ่ม ถ้าไม่ซ้ำให้ Append เข้า Array
          newItems.forEach(newItem => {
            const matchIndex = updatedItems.findIndex(oldItem => oldItem.name === newItem.name);
            if (matchIndex > -1) {
              updatedItems[matchIndex].qty += newItem.qty;
            } else {
              updatedItems.push(newItem);
            }
          });

          const currentNote = document.getElementById('order-note').value;
          const updatedNote = oldOrder.note ? `${oldOrder.note} | ➕ สั่งเพิ่ม: ${currentNote}` : `➕ สั่งเพิ่ม: ${currentNote}`;

          transaction.update(orderRef, {
            items: updatedItems,
            totalPrice: oldOrder.totalPrice + addPrice,
            totalCost: oldOrder.totalCost + addCost,
            profit: (oldOrder.totalPrice + addPrice) - (oldOrder.totalCost + addCost),
            note: updatedNote
          });
        }).then(() => {
          alert("ส่งรายการสั่งเพิ่มเข้าระบบครัวเรียบร้อยแล้วครับ!");
          isAddMoreMode = false;
          document.getElementById('add-more-alert').classList.add('hidden');
          document.getElementById('order-note').value = "";
          document.getElementById('btn-submit').disabled = false;
          checkOrderStatus();
        }).catch((err) => {
          alert("เกิดข้อผิดพลาด: " + err);
          document.getElementById('btn-submit').disabled = false;
        });

      } else {
        // เคสที่ 2: สั่งซื้อครั้งแรกปกติ (สร้างคิวใหม่)
        db.collection("orders").get().then((snap) => {
          const queueNo = snap.size + 1;
          const newOrder = {
            queueNo: queueNo,
            tableNum: tableNumber,
            items: newItems,
            note: document.getElementById('order-note').value,
            totalPrice: addPrice,
            totalCost: addCost,
            profit: addPrice - addCost,
            status: "รอทำ",
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
          };

          db.collection("orders").add(newOrder).then((docRef) => {
            currentOrderId = docRef.id;
            localStorage.setItem('active_order_id', currentOrderId);
            document.getElementById('order-note').value = "";
            document.getElementById('btn-submit').disabled = false;
            checkOrderStatus();
          });
        });
      }
    }

    // --- ระบบติดตามสถานะคิวเรียลไทม์ ---
    function checkOrderStatus() {
      if (!currentOrderId) return;

      db.collection("orders").doc(currentOrderId).onSnapshot((doc) => {
        if (!doc.exists) return;
        const order = doc.data();

        // หากลูกค้ากำลังอยู่ในโหมดเลือกอาหารเพื่อสั่งเพิ่ม ไม่ต้องดึงหน้าจอบังคิวกลับมาล็อก
        if (isAddMoreMode) return;

        document.getElementById('active-queue-badge').classList.remove('hidden');
        document.getElementById('my-queue-no').innerText = order.queueNo;

        const card = document.getElementById('status-card');
        const statusTxt = document.getElementById('order-status-text');
        const statusDesc = document.getElementById('order-status-desc');
        const progress = document.getElementById('status-progress');
        
        card.classList.remove('hidden');
        document.getElementById('cart-bar').classList.add('hidden'); 
        document.getElementById('menu-section').classList.add('hidden');
        document.getElementById('note-section').classList.add('hidden');

        // สั่งกระตุ้นเสียงเตือน/สั่นเมื่อสถานะเปลี่ยนจริง
        if (order.status !== lastStatus) {
          notifyClient(order.status);
          lastStatus = order.status;
          localStorage.setItem('last_known_status', lastStatus);
        }

        if (order.status === "รอทำ") {
          statusTxt.innerText = "⏳ รอรับออเดอร์...";
          statusTxt.className = "text-2xl font-black text-amber-400";
          statusDesc.innerHTML = `คิวของคุณอยู่ในระบบแล้ว รอแม่ค้าเทแป้งสักครู่นะคะ<br><span class="text-amber-300 font-bold">🛒 สั่งไว้ทั้งหมด: ${order.items.reduce((a, b) => a + b.qty, 0)} ชิ้น</span>`;
          progress.style.width = "30%"; progress.className = "bg-amber-500 h-2.5 rounded-full";
        } 
        else if (order.status === "กำลังทำ") {
          statusTxt.innerText = "🍳 กำลังปรุงรสบนเตา...";
          statusTxt.className = "text-2xl font-black text-blue-400";
          statusDesc.innerHTML = `ขนมโตเกียวของคุณกำลังอยู่บนเตาร้อน ๆ กลิ่นหอมฟุ้งเลย!<br><span class="text-blue-300 font-bold">🛒 อยู่บนเตา: ${order.items.reduce((a, b) => a + b.qty, 0)} ชิ้น</span>`;
          progress.style.width = "65%"; progress.className = "bg-blue-500 h-2.5 rounded-full";
        } 
        else if (order.status === "เสร็จแล้ว") {
          statusTxt.innerText = "🥞 ทำเสร็จแล้วจ้า! 🎉";
          statusTxt.className = "text-2xl font-black text-green-400 animate-bounce";
          statusDesc.innerText = `กรุณาเดินมารับขนมโตเกียวรวมทั้งสิ้น ${order.items.reduce((a, b) => a + b.qty, 0)} ชิ้น ได้ที่หน้าเตาเลยครับ!`;
          progress.style.width = "100%"; progress.className = "bg-green-500 h-2.5 rounded-full";
        } 
        else if (order.status === "เสร็จสิ้น") {
          localStorage.removeItem('active_order_id');
          localStorage.removeItem('last_known_status');
          currentOrderId = null;
          lastStatus = "";
          location.reload(); 
        }
      });
    }

    if (currentOrderId) { checkOrderStatus(); }
  </script>
</body>
</html>

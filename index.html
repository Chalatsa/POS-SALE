

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>โตเกียวร้อนๆ สั่งเลย!</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-amber-50 text-slate-800 font-sans antialiased min-h-screen pb-24">

  <div class="bg-amber-500 text-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center">
    <h1 class="text-xl font-bold flex items-center gap-2">🥞 ร้านโตเกียวแสนอร่อย</h1>
    <div class="bg-amber-700 px-3 py-1 rounded-full text-xs font-bold" id="my-queue-badge">ยังไม่มีคิว</div>
  </div>

  <div class="max-w-md mx-auto p-4 space-y-6">
    <div id="status-card" class="hidden bg-white p-4 rounded-xl shadow-sm border-2 border-amber-400 text-center space-y-2">
      <p class="text-sm text-gray-500">คิวของคุณ</p>
      <div class="text-3xl font-black text-amber-600" id="status-queue-number">-</div>
      <p class="font-semibold text-lg" id="status-text">รอคิว...</p>
    </div>

    <div class="space-y-4">
      <h2 class="text-lg font-bold border-b pb-1 text-amber-800">📋 เมนูโตเกียว</h2>
      <div id="menu-container" class="space-y-3">
        <p class="text-center text-gray-400 py-4">กำลังโหลดเมนูอร่อย ๆ...</p>
      </div>
    </div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t p-4 flex justify-between items-center shadow-lg">
    <div>
      <p class="text-xs text-gray-500">ทั้งหมด <span id="cart-count">0</span> ชิ้น</p>
      <p class="text-xl font-bold text-amber-600">฿<span id="cart-total">0</span></p>
    </div>
    <button onclick="openOrderModal()" class="bg-amber-500 hover:bg-amber-600 text-white font-bold px-6 py-2.5 rounded-xl shadow-md transition-all">
      ดูรายการที่สั่ง
    </button>
  </div>

  <div id="order-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-end justify-center p-4">
    <div class="bg-white rounded-t-2xl max-w-md w-full p-6 space-y-4 shadow-xl">
      <h3 class="text-lg font-bold text-gray-900 border-b pb-2">🛒 ยืนยันออเดอร์ของคุณ</h3>
      <div id="modal-items-list" class="space-y-2 max-h-40 overflow-y-auto"></div>
      
      <div>
        <label class="text-xs font-semibold text-gray-500">หมายเหตุ (เช่น ไม่ผัก / กรอบๆ / แยกถุง)</label>
        <input type="text" id="order-note" placeholder="ระบุเพิ่มเติม..." class="w-full border p-2 rounded-lg text-sm mt-1 focus:outline-none focus:border-amber-500">
      </div>

      <div class="flex gap-3 pt-2">
        <button onclick="closeOrderModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 py-2.5 rounded-xl font-medium">ยกเลิก</button>
        <button onclick="submitOrder()" class="flex-1 bg-green-500 hover:bg-green-600 text-white py-2.5 rounded-xl font-bold shadow-md">ส่งออเดอร์เลย</button>
      </div>
    </div>
  </div>

  <script>
    // รวม Firebase Config ของคุณเรียบร้อยแล้ว
    const firebaseConfig = {
      apiKey: "AIzaSyC-slki_yhAJuHbizE4q1CDUz9rV4vHeL4",
      authDomain: "pos-sale-9c1d6.firebaseapp.com",
      projectId: "pos-sale-9c1d6",
      storageBucket: "pos-sale-9c1d6.firebasestorage.app",
      messagingSenderId: "55694019495",
      appId: "1:55694019495:web:6b7e4612f30bf1ad4e4482",
      measurementId: "G-ZCLCDJQ2F1"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let cart = [];
    let menusData = {};
    // เปลี่ยนมาใช้คำสั่งดึงค่าเบอร์โต๊ะจาก URL ผ่าน JavaScript หน้าบ้านโดยตรง (ไม่พึ่งพาฝั่ง Google Server)
    const urlParams = new URLSearchParams(window.location.search);
    const tableNumber = urlParams.get('table') || "หน้าร้าน"; 

    // 1. ดึงข้อมูลเมนูแบบเรียลไทม์
    db.collection("menus").onSnapshot((snapshot) => {
      const container = document.getElementById("menu-container");
      container.innerHTML = "";
      
      if(snapshot.empty) {
        container.innerHTML = `<p class="text-center text-gray-400 py-4">ร้านยังไม่มีรายการเมนูในขณะนี้</p>`;
        return;
      }

      snapshot.forEach((doc) => {
        const item = doc.data();
        menusData[doc.id] = item; 

        if(item.status === "available") {
          container.innerHTML += `
            <div class="bg-white p-3 rounded-xl shadow-sm flex gap-3 items-center border border-amber-100">
              <img src="${item.image || 'https://images.unsplash.com/photo-1587314168485-3236d6710814?w=200'}" class="w-16 h-16 object-cover rounded-lg bg-amber-100 flex-shrink-0">
              <div class="flex-1 min-w-0">
                <h3 class="font-bold text-gray-800 truncate">${item.name}</h3>
                <p class="text-amber-600 text-sm font-semibold">฿${item.price}</p>
              </div>
              <div class="flex items-center gap-2">
                <button onclick="updateCart('${doc.id}', -1)" class="w-8 h-8 bg-gray-100 rounded-full font-bold text-gray-600">-</button>
                <span id="qty-${doc.id}" class="w-6 text-center font-bold">0</span>
                <button onclick="updateCart('${doc.id}', 1)" class="w-8 h-8 bg-amber-500 text-white rounded-full font-bold">+</button>
              </div>
            </div>
          `;
        }
      });
      cart.forEach(item => {
        const el = document.getElementById(`qty-${item.id}`);
        if(el) el.innerText = item.qty;
      });
    });

    // 2. ฟังก์ชันปรับปรุงจำนวนตะกร้า
    function updateCart(id, change) {
      const itemIndex = cart.findIndex(i => i.id === id);
      if (itemIndex > -1) {
        cart[itemIndex].qty += change;
        if (cart[itemIndex].qty <= 0) cart.splice(itemIndex, 1);
      } else if (change > 0) {
        cart.push({ id: id, qty: 1 });
      }
      const el = document.getElementById(`qty-${id}`);
      if(el) el.innerText = cart.find(i => i.id === id)?.qty || 0;
      calculateTotal();
    }

    function calculateTotal() {
      let count = 0, total = 0;
      cart.forEach(item => {
        count += item.qty;
        total += (menusData[item.id].price * item.qty);
      });
      document.getElementById("cart-count").innerText = count;
      document.getElementById("cart-total").innerText = total;
    }

    function openOrderModal() {
      if(cart.length === 0) return alert("กรุณาเลือกเมนูก่อนครับ");
      const list = document.getElementById("modal-items-list");
      list.innerHTML = cart.map(item => `
        <div class="flex justify-between text-sm">
          <span>${menusData[item.id].name} x ${item.qty}</span>
          <span class="font-bold">฿${menusData[item.id].price * item.qty}</span>
        </div>
      `).join('');
      document.getElementById("order-modal").classList.remove("hidden");
    }

    function closeOrderModal() {
      document.getElementById("order-modal").classList.add("hidden");
    }

    // 3. ฟังก์ชันกดยืนยันออเดอร์ (คำนวณกำไร และ ดึงเลขคิวรันอัตโนมัติ)
    async function submitOrder() {
      const note = document.getElementById("order-note").value;
      const totalAmount = parseInt(document.getElementById("cart-total").innerText);
      
      let totalCost = 0;
      cart.forEach(item => {
        totalCost += ((menusData[item.id].cost || 0) * item.qty);
      });

      try {
        const ordersRef = db.collection("orders");
        const snapshot = await ordersRef.get();
        const queueNumber = snapshot.size + 1; // รันหมายเลขคิวใหม่ต่อจากยอดทั้งหมด

        ordersRef.add({
          queueNo: queueNumber,
          tableNum: tableNumber,
          items: cart.map(i => ({ name: menusData[i.id].name, qty: i.qty })),
          totalPrice: totalAmount,
          totalCost: totalCost,
          profit: totalAmount - totalCost,
          note: note,
          status: "รอทำ",
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }).then((docRef) => {
          closeOrderModal();
          // รีเซ็ตจำนวนบนจอและตะกร้า
          cart = [];
          calculateTotal();
          document.querySelectorAll("[id^='qty-']").forEach(el => el.innerText = 0);
          
          alert("ส่งออเดอร์ไปยังเตาเรียบร้อยแล้วครับ! หมายเลขคิวของคุณคือ #" + queueNumber);
          trackMyQueue(docRef.id, queueNumber);
        });
      } catch (error) {
        alert("เกิดข้อผิดพลาดในการส่งออเดอร์: " + error.message);
      }
    }

    // 4. ระบบตามคิวตัวเองแบบเรียลไทม์
    function trackMyQueue(docId, queueNo) {
      document.getElementById("my-queue-badge").innerText = "คิวของคุณ: #" + queueNo;
      const statusCard = document.getElementById("status-card");
      statusCard.classList.remove("hidden");
      document.getElementById("status-queue-number").innerText = "#" + queueNo;

      db.collection("orders").doc(docId).onSnapshot((doc) => {
        if (!doc.exists) return;
        const data = doc.data();
        const statusText = document.getElementById("status-text");
        statusText.innerText = data.status;
        
        if(data.status === "กำลังทำ") {
          statusText.className = "font-semibold text-lg text-blue-600 animate-pulse";
          statusText.innerText = "👨‍🍳 กำลังม้วนโตเกียวให้คุณ...";
        } else if(data.status === "เสร็จแล้ว") {
          statusText.className = "font-bold text-lg text-green-600 animate-bounce";
          statusText.innerText = "🥞 เสร็จแล้ว! มารับได้เลยครับ";
        } else if(data.status === "เสร็จสิ้น") {
          statusCard.classList.add("hidden");
          document.getElementById("my-queue-badge").innerText = "ยังไม่มีคิว";
        }
      });
    }
  </script>
</body>
</html>

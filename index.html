<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สั่งขนมโตเกียวออนไลน์ - ร้านโตเกียว</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen pb-24">

  <div class="bg-amber-500 text-slate-900 px-4 py-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
    <div>
      <h1 class="text-xl font-black">🥞 โตเกียวร้อน ๆ จากเตา</h1>
      <p class="text-xs font-semibold opacity-80" id="table-display">กำลังโหลดเลขโต๊ะ...</p>
    </div>
    <div id="active-queue-badge" class="hidden bg-slate-950 text-amber-400 px-3 py-1.5 rounded-full text-xs font-black shadow animate-pulse">
      คิวของคุณ: #<span id="my-queue-no">-</span>
    </div>
  </div>

  <div class="max-w-md mx-auto p-4 space-y-6">
    <div id="status-card" class="hidden bg-slate-900 text-white p-5 rounded-2xl shadow-xl border-2 border-amber-500/20 space-y-3 text-center">
      <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">สถานะออเดอร์ของคุณ</h3>
      <div class="py-4">
        <p id="order-status-text" class="text-2xl font-black text-amber-400 animate-bounce">⏳ รอรับออเดอร์...</p>
        <p id="order-status-desc" class="text-xs text-gray-400 mt-2">ห้องครัวกำลังจัดเตรียมวัตถุดิบ</p>
      </div>
      <div class="w-full bg-slate-800 rounded-full h-2.5 overflow-hidden">
        <div id="status-progress" class="bg-amber-500 h-2.5 rounded-full transition-all duration-500" style="width: 25%"></div>
      </div>
    </div>

    <div id="menu-section" class="space-y-4">
      <h2 class="text-lg font-black text-slate-900 border-l-4 border-amber-500 pl-2">🥞 เลือกไส้ขนมโตเกียว</h2>
      <div id="menu-list" class="grid grid-cols-1 gap-3">
        <p class="text-sm text-gray-500">กำลังโหลดเมนูความอร่อย...</p>
      </div>
    </div>

    <div id="note-section" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
      <label class="text-xs font-bold text-gray-500 block mb-1">✍️ หมายเหตุเพิ่มเติม (ถ้ามี)</label>
      <input type="text" id="order-note" placeholder="เช่น ไม่ใส่ซอส, ขอแป้งกรอบ ๆ" class="w-full p-2.5 rounded-xl border border-gray-300 text-sm focus:outline-none focus:border-amber-500 bg-gray-50">
    </div>
  </div>

  <div id="cart-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 shadow-xl max-w-md mx-auto rounded-t-3xl z-40">
    <div class="flex justify-between items-center gap-4">
      <div>
        <p class="text-xs text-gray-400 font-bold">ราคารวมทั้งสิ้น</p>
        <p class="text-xl font-black text-slate-900">฿<span id="cart-total-price">0</span></p>
      </div>
      <button onclick="submitOrder()" id="btn-submit" class="flex-1 bg-amber-500 hover:bg-amber-600 text-slate-900 font-black py-3 px-6 rounded-2xl transition-all shadow-md text-center">
        🚀 ส่งรายการสั่งอาหาร
      </button>
    </div>
  </div>

  <script>
    // ดึงค่าเบอร์โต๊ะจาก URL ผ่านระบบหน้าบ้านตรงตามที่เราปรับแก้กันไป
    const urlParams = new URLSearchParams(window.location.search);
    const tableNumber = urlParams.get('table') || "หน้าร้าน";
    document.getElementById('table-display').innerText = `📍 ตรวจพบตำแหน่ง: โต๊ะ ${tableNumber}`;

    const firebaseConfig = {
      apiKey: "AIzaSyC-slki_yhAJuHbizE4q1CDUz9rV4vHeL4",
      authDomain: "pos-sale-9c1d6.firebaseapp.com",
      projectId: "pos-sale-9c1d6",
      storageBucket: "pos-sale-9c1d6.firebasestorage.app",
      messagingSenderId: "55694019495",
      appId: "1:55694019495:web:6b7e4612f30bf1ad4e4482",
      measurementId: "G-ZCLCDJQ2F1"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let cart = {};
    let currentOrderId = localStorage.getItem('active_order_id') || null;
    let lastStatus = ""; // ตัวแปรคอยจำสถานะล่าสุดเพื่อไม่ให้สั่นซ้ำซ้อน

    // 🔊 ⚡ ฟังก์ชันสั่งเสียงเตือนและสั่นเตือนฝั่งลูกค้า
    function notifyClient(status) {
      // 1. ระบบสั่น (สั่งสั่นเป็นจังหวะ สั่น 300ms, หยุด 100ms, สั่น 300ms)
      if ("vibrate" in navigator) {
        if (status === "เสร็จแล้ว") {
          navigator.vibrate([300, 100, 300, 100, 400]); // สั่นเน้น ๆ ตอนทำเสร็จ
        } else if (status === "กำลังทำ") {
          navigator.vibrate(200); // สั่นสั้น ๆ ตอนเริ่มทำ
        }
      }

      // 2. ระบบเสียงแจ้งเตือน (สร้างคลื่นเสียงปี๊บความถี่สูงใส ๆ)
      try {
        const context = new (window.AudioContext || window.webkitAudioContext)();
        const osc = context.createOscillator();
        const gain = context.createGain();
        
        osc.type = "sine";
        // ถ้าเสร็จแล้วใช้เสียงสูงสองจังหวะดึงดูดความสนใจ
        if (status === "เสร็จแล้ว") {
          osc.frequency.setValueAtTime(900, context.currentTime);
          osc.frequency.setValueAtTime(1200, context.currentTime + 0.15);
          osc.connect(gain); gain.connect(context.destination);
          osc.start(); osc.stop(context.currentTime + 0.35);
        } else {
          osc.frequency.setValueAtTime(700, context.currentTime);
          osc.connect(gain); gain.connect(context.destination);
          osc.start(); osc.stop(context.currentTime + 0.15);
        }
      } catch(e) { console.log("เสียงไม่ทำงานเนื่องจากสิทธิ์เบราว์เซอร์หรือเครื่องปิดเสียงอยู่"); }
    }

    // โดดร่มดึงข้อมูลรายการอาหารจาก Firebase
    db.collection("menus").where("status", "==", "available").onSnapshot((snapshot) => {
      const menuList = document.getElementById('menu-list');
      menuList.innerHTML = "";
      snapshot.forEach((doc) => {
        const item = doc.data();
        menuList.innerHTML += `
          <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-200 flex gap-3 items-center">
            <img src="${item.image}" class="w-20 h-20 object-cover rounded-xl bg-gray-100 flex-shrink-0">
            <div class="flex-1 min-w-0">
              <h3 class="font-bold text-slate-900 truncate">${item.name}</h3>
              <p class="text-sm font-black text-amber-600 mt-1">฿${item.price}</p>
            </div>
            <div class="flex items-center gap-2 bg-gray-100 p-1.5 rounded-xl">
              <button onclick="updateQty('${item.name}', -1, ${item.price}, ${item.cost || 0})" class="bg-white w-7 h-7 font-bold rounded-lg shadow-sm flex items-center justify-center active:scale-95 text-sm">-</button>
              <span id="qty-${item.name.replace(/\s+/g, '')}" class="w-6 text-center text-sm font-bold">0</span>
              <button onclick="updateQty('${item.name}', 1, ${item.price}, ${item.cost || 0})" class="bg-amber-500 text-slate-900 w-7 h-7 font-bold rounded-lg shadow-sm flex items-center justify-center active:scale-95 text-sm">+</button>
            </div>
          </div>
        `;
      });
      // คืนค่าจำนวนของในตะกร้าเดิมหากมีการรีเฟรชหน้าจอ
      Object.keys(cart).forEach(name => {
        const el = document.getElementById(`qty-${name.replace(/\s+/g, '')}`);
        if(el) el.innerText = cart[name].qty;
      });
    });

    function updateQty(name, change, price, cost) {
      if (!cart[name]) cart[name] = { qty: 0, price: price, cost: cost };
      cart[name].qty += change;
      if (cart[name].qty <= 0) delete cart[name];
      
      const el = document.getElementById(`qty-${name.replace(/\s+/g, '')}`);
      if(el) el.innerText = cart[name].qty ? cart[name].qty : 0;
      updateCartTotal();
    }

    function updateCartTotal() {
      let total = 0;
      Object.keys(cart).forEach(k => total += (cart[k].qty * cart[k].price));
      document.getElementById('cart-total-price').innerText = total.toLocaleString();
    }

    // ฟังก์ชันกดส่งออเดอร์ข้ามไปห้องครัว
    function submitOrder() {
      const items = Object.keys(cart).map(k => ({ name: k, qty: cart[k].qty, price: cart[k].price, cost: cart[k].cost }));
      if (items.length === 0) return alert("กรุณาเลือกไส้ขนมโตเกียวอย่างน้อย 1 ชิ้นก่อนส่งครับ");

      let totalPrice = 0, totalCost = 0;
      items.forEach(i => { totalPrice += (i.qty * i.price); totalCost += (i.qty * i.cost); });

      document.getElementById('btn-submit').disabled = true;
      document.getElementById('btn-submit').innerText = "🚀 กำลังยิงออเดอร์...";

      // ดึงคิวล่าสุดมาบวกหนึ่ง
      db.collection("orders").get().then((snap) => {
        const queueNo = snap.size + 1;
        
        const newOrder = {
          queueNo: queueNo,
          tableNum: tableNumber,
          items: items,
          note: document.getElementById('order-note').value,
          totalPrice: totalPrice,
          totalCost: totalCost,
          profit: totalPrice - totalCost,
          status: "รอทำ",
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        db.collection("orders").add(newOrder).then((docRef) => {
          currentOrderId = docRef.id;
          localStorage.setItem('active_order_id', currentOrderId);
          checkOrderStatus(); // รันระบบติดตามความเคลื่อนไหวคิวทันที
        });
      });
    }

    // --- ระบบติดตามสถานะคิวแบบ Real-time และเรียกสั่น/เสียงเตือน ---
    function checkOrderStatus() {
      if (!currentOrderId) return;

      db.collection("orders").doc(currentOrderId).onSnapshot((doc) => {
        if (!doc.exists) return;
        const order = doc.data();

        // แสดงผลเลขคิวตนเองที่หัวข้อบนสุด
        document.getElementById('active-queue-badge').classList.remove('hidden');
        document.getElementById('my-queue-no').innerText = order.queueNo;

        // แสดงผลการ์ดสถานะคิว
        const card = document.getElementById('status-card');
        const statusTxt = document.getElementById('order-status-text');
        const statusDesc = document.getElementById('order-status-desc');
        const progress = document.getElementById('status-progress');
        
        card.classList.remove('hidden');
        document.getElementById('cart-bar').classList.add('hidden'); // ซ่อนตะกร้าหลังสั่งเสร็จ
        document.getElementById('menu-section').classList.add('hidden');
        document.getElementById('note-section').classList.add('hidden');

        // ตรวจจับความเปลี่ยนแปลงเพื่อยิงระบบเสียงและสั่น (ป้องกันการสั่นซ้ำซ้อน)
        if (order.status !== lastStatus) {
          notifyClient(order.status);
          lastStatus = order.status;
        }

        // ปรับแต่งการ์ดสถานะตามความคืบหน้าของครัว
        if (order.status === "รอทำ") {
          statusTxt.innerText = "⏳ รอรับออเดอร์...";
          statusTxt.className = "text-2xl font-black text-amber-400 animate-bounce";
          statusDesc.innerText = "คิวของคุณได้รับเข้าระบบแล้ว รอแม่ค้าเทแป้งสักครู่นะคะ";
          progress.style.width = "30%"; progress.className = "bg-amber-500 h-2.5 rounded-full";
        } 
        else if (order.status === "กำลังทำ") {
          statusTxt.innerText = "🍳 กำลังปรุงรสบนเตา...";
          statusTxt.className = "text-2xl font-black text-blue-400 animate-pulse";
          statusDesc.innerText = "ขนมโตเกียวของคุณกำลังอยู่บนเตาร้อน ๆ กลิ่นหอมฟุ้งเลย!";
          progress.style.width = "65%"; progress.className = "bg-blue-500 h-2.5 rounded-full";
        } 
        else if (order.status === "เสร็จแล้ว") {
          statusTxt.innerText = "🥞 ทำเสร็จแล้วจ้า! 🎉";
          statusTxt.className = "text-2xl font-black text-green-400 animate-bounce";
          statusDesc.innerText = "กรุณาเดินมารับขนมโตเกียวแสนอร่อยได้ที่หน้าเตาเลยครับ!";
          progress.style.width = "100%"; progress.className = "bg-green-500 h-2.5 rounded-full";
        } 
        else if (order.status === "เสร็จสิ้น") {
          // ถ้าลูกค้ารับของไปแล้ว ให้ล้างความจำและรีเซ็ตแอปกลับมาหน้าสั่งของใหม่เพื่อเปิดโอกาสให้สั่งต่อได้
          localStorage.removeItem('active_order_id');
          currentOrderId = null;
          lastStatus = "";
          location.reload(); 
        }
      });
    }

    // ตรวจสอบค้างคิวเดิมไว้กรณีลูกค้าแอบปิดเบราว์เซอร์ไปแล้วเปิดขึ้นมาใหม่
    if (currentOrderId) { checkOrderStatus(); }
  </script>
</body>
</html>
